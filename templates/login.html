<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Management System | Login</title>

  <!-- Flask static CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <!-- Shared Mobile CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
</head>
<body>

<div class="container">

  <!-- Logo -->
  <div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Polar Analytics Logo" class="brand-logo" />
    <h1>POLAR ANALYTICS</h1>
    <p>Service Intelligence Platform</p>
  </div>

  <!-- Login Card -->
  <div class="card">
    <h2>Sign In</h2>

    <form id="loginForm" onsubmit="handleLogin(event)">
      
      <div class="input-group">
        <label>Email Address</label>
        <div class="input-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-mail"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        Sign In
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </form>

    <!-- Message -->
    <div id="message" class="message" style="display:none;"></div>

  </div>
</div>

<script>
// static/js/auth.js

function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const messageDiv = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");

    messageDiv.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.innerText = "Signing in...";

    fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            messageDiv.className = "message error";
            messageDiv.innerText = data.error || "Login failed";
            messageDiv.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.innerText = "→ Sign In";
        } else {
            messageDiv.className = "message success";
            messageDiv.innerText = "Login successful. Redirecting...";
            messageDiv.style.display = "block";

            setTimeout(() => {
        window.location.href = "/dashboard";
    }, 1000);
        }
    })
    .catch(() => {
        messageDiv.className = "message error";
        messageDiv.innerText = "Server error";
        messageDiv.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.innerText = "→ Sign In";
    });
}

</script>

</body>
</html>
